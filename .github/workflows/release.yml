name: Release

# Automatic on every vX.Y.Z tag; also runnable on demand for a given tag.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to (re)build a release for, e.g. v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ github.event.inputs.tag || github.ref_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: collected
          merge-multiple: true

      - name: Checksums + release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Bare filenames (no ./ prefix) so install scripts and self-update can
          # look assets up by name.
          cd collected && sha256sum vigil_* > checksums.txt && cd ..
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See CHANGELOG.md." > notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: notes.md
          generate_release_notes: true
          files: collected/*

  brew-scoop:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true # needs the tap/bucket repos + TAP_GITHUB_TOKEN
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: collected
          merge-multiple: true
      - name: Update Homebrew tap and Scoop bucket
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${TAP_GITHUB_TOKEN:-}" ] || { echo "no TAP_GITHUB_TOKEN; skipping"; exit 0; }
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          base="https://github.com/simtabi/vigil/releases/download/${TAG}"
          sha() { sha256sum "collected/$1" | awk '{print $1}'; }

          git config --global user.email "imanimanyara@users.noreply.github.com"
          git config --global user.name "Imani Manyara"

          git clone "https://x:${TAP_GITHUB_TOKEN}@github.com/simtabi/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/vigil.rb <<EOF
          class Vigil < Formula
            desc "Keep Microsoft Teams active on a configurable schedule"
            homepage "https://opensource.simtabi.com/products/vigil"
            version "${VERSION}"
            license "MIT"
            on_macos do
              on_arm { url "${base}/vigil_macos_arm64.tar.gz"; sha256 "$(sha vigil_macos_arm64.tar.gz)" }
              on_intel { url "${base}/vigil_macos_amd64.tar.gz"; sha256 "$(sha vigil_macos_amd64.tar.gz)" }
            end
            on_linux do
              on_arm { url "${base}/vigil_linux_arm64.tar.gz"; sha256 "$(sha vigil_linux_arm64.tar.gz)" }
              on_intel { url "${base}/vigil_linux_amd64.tar.gz"; sha256 "$(sha vigil_linux_amd64.tar.gz)" }
            end
            def install
              # archives contain a flat-named binary (vigil_<os>_<arch>); install it as vigil
              bin.install Dir["vigil_*"].first => "vigil"
            end
            test do
              system "#{bin}/vigil", "version"
            end
          end
          EOF
          (cd tap && git add -A && git commit -m "vigil ${VERSION}" && git push)

          git clone "https://x:${TAP_GITHUB_TOKEN}@github.com/simtabi/scoop-bucket.git" bucket
          cat > bucket/vigil.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Keep Microsoft Teams active on a configurable schedule",
            "homepage": "https://opensource.simtabi.com/products/vigil",
            "license": "MIT",
            "architecture": {
              "64bit": { "url": "${base}/vigil_windows_amd64.zip", "hash": "$(sha vigil_windows_amd64.zip)", "bin": [["vigil_windows_amd64.exe", "vigil"]] },
              "32bit": { "url": "${base}/vigil_windows_386.zip", "hash": "$(sha vigil_windows_386.zip)", "bin": [["vigil_windows_386.exe", "vigil"]] },
              "arm64": { "url": "${base}/vigil_windows_arm64.zip", "hash": "$(sha vigil_windows_arm64.zip)", "bin": [["vigil_windows_arm64.exe", "vigil"]] }
            }
          }
          EOF
          (cd bucket && git add -A && git commit -m "vigil ${VERSION}" && git push)
