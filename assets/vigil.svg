<?xml version="1.0" encoding="UTF-8"?>
<!-- vigil — an open eye (vigilance / keeping watch) with a green "available" pupil. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="vigil">
  <defs>
    <radialGradient id="pupil" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#5BE584"/>
      <stop offset="60%" stop-color="#27C93F"/>
      <stop offset="100%" stop-color="#16A02B"/>
    </radialGradient>
  </defs>

  <!-- rounded square backdrop -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#13151A"/>

  <!-- eye almond -->
  <path d="M256 152
           C 360 152 444 214 472 256
           C 444 298 360 360 256 360
           C 152 360 68 298 40 256
           C 68 214 152 152 256 152 Z"
        fill="none" stroke="#E8EAED" stroke-width="22" stroke-linejoin="round"/>

  <!-- iris -->
  <circle cx="256" cy="256" r="92" fill="#1E2128" stroke="#E8EAED" stroke-width="14"/>
  <!-- green "available" pupil -->
  <circle cx="256" cy="256" r="54" fill="url(#pupil)"/>
  <!-- catch-light -->
  <circle cx="232" cy="232" r="16" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
