# nfpm config for deb/rpm packages. ARCH/VERSION/GOARCH are supplied via the
# environment by the release workflow (nfpm expands ${VAR}).
name: vigil
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: "Imani Manyara <imani@simtabi.com>"
description: |
  Keep Microsoft Teams active on a configurable schedule.
vendor: Simtabi LLC
homepage: https://opensource.simtabi.com/products/vigil
license: MIT
contents:
  - src: ./dist/vigil_linux_${GOARCH}
    dst: /usr/bin/vigil
